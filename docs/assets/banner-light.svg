<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="Keel — flow-driven smart DCA">
  <rect width="1200" height="260" fill="#f4f6f7"/>
  <rect x="0" y="0" width="1200" height="260" fill="none" stroke="#e3e7ea" stroke-width="2"/>
  <!-- keel mark: waterline + hull curve -->
  <g transform="translate(80,58)">
    <path d="M0 52 L144 52" stroke="#0b0e11" stroke-width="13" stroke-linecap="round"/>
    <path d="M18 60 Q72 142 126 60" stroke="#125e73" stroke-width="13" stroke-linecap="round" fill="none"/>
  </g>
  <!-- wordmark + tagline -->
  <g font-family="Manrope, 'Segoe UI', ui-sans-serif, system-ui, sans-serif">
    <text x="272" y="128" font-size="72" font-weight="800" letter-spacing="-2" fill="#0b0e11">Keel</text>
    <text x="276" y="172" font-size="21" font-weight="600" fill="#3d454c">Stack through the storm.</text>
    <text x="276" y="202" font-size="16" fill="#5c666e">Flow-driven smart DCA — every buy sized by live institutional ETF flows, signed by you.</text>
  </g>
  <!-- provenance strip motif -->
  <g font-family="'JetBrains Mono', ui-monospace, Consolas, monospace" font-size="13" fill="#8a949c">
    <circle cx="906" cy="120" r="4" fill="#0f7a4d"/>
    <text x="920" y="125">data: SoDEX mainnet</text>
    <circle cx="906" cy="150" r="4" fill="#a8760a"/>
    <text x="920" y="155">execution: testnet sandbox</text>
    <circle cx="906" cy="180" r="4" fill="#125e73"/>
    <text x="920" y="185">signal: SoSoValue ETF flows</text>
  </g>
</svg>
